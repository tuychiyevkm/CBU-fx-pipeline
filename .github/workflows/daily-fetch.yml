name: Daily fetch

# Runs every day at 07:00 UTC = 12:00 Asia/Tashkent (UTC+5), after the CBU
# publishes the day's rates. Also runnable on demand via the Actions tab.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

# Allow the job to push the regenerated Parquet back to the repository.
permissions:
  contents: write

# Never run two daily jobs at once.
concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest rates, upsert, export Parquet
        env:
          # The Supabase Session Pooler (IPv4) connection string. GitHub
          # Actions runners are IPv4-only; the pooler host is required here.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m src.fetch_daily

      - name: Commit updated Parquet if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/rates.parquet)" ]]; then
            git add data/rates.parquet
            git commit -m "chore(data): daily rates refresh [skip ci]"
            git push
          else
            echo "No change in data/rates.parquet; nothing to commit."
          fi
